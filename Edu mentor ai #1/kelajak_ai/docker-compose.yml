version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: kelajak_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: kelajak_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kelajak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelajak_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kelajak_user:secure_password@db:5432/kelajak_db
      SECRET_KEY: uzbekistan_secret_2024
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kelajak-network
    volumes:
      - ./backend:/app

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend-web:/usr/share/nginx/html
    networks:
      - kelajak-network

networks:
  kelajak-network:
    driver: bridge

volumes:
  pgdata: